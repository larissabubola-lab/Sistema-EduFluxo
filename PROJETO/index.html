        function toggleLoginMode() {
            modoLogin = !modoLogin;
            const toggleBtn = document.getElementById('toggle-login');
            const loginTitle = document.getElementById('login-title');
            const loginBtn = document.getElementById('login-btn');
            const confirmPasswordGroup = document.getElementById('confirm-password-group');
            
            if (modoLogin) {
                toggleBtn.textContent = 'Não tem uma conta? Criar conta';
                loginTitle.textContent = 'Fazer Login';
                loginBtn.textContent = 'Entrar';
                confirmPasswordGroup.style.display = 'none';
            } else {
                toggleBtn.textContent = 'Já tem uma conta? Fazer login';
                loginTitle.textContent = 'Criar Nova Conta';
                loginBtn.textContent = 'Criar Conta';
                confirmPasswordGroup.style.display = 'block';
            }
            
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('confirm-password').value = '';
            document.getElementById('password-error').classList.remove('visible');
        }

        function validarConfirmacaoSenha() {
            if (modoLogin) return true;
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorElement = document.getElementById('password-error');
            
            if (password !== confirmPassword) {
                errorElement.classList.add('visible');
                return false;
            } else {
                errorElement.classList.remove('visible');
                return true;
            }
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (!email || !validarEmail(email)) {
                alert('❌ Por favor, insira um email válido.');
                return;
            }
            
            if (!password || password.length < 6) {
                alert('❌ A senha deve ter pelo menos 6 caracteres.');
                return;
            }
            
            if (!modoLogin && !validarConfirmacaoSenha()) {
                alert('❌ As senhas não coincidem.');
                return;
            }
            
            let conta = contasRegistradas.find(c => c.email === email);
            
            if (modoLogin) {
                
                if (!conta) {
                    alert('❌ Nenhuma conta encontrada com este email.');
                    return;
                }
                
                if (conta.password !== password) {
                    alert('❌ Senha incorreta.');
                    return;
                }
            } else {
                
                if (conta) {
                    alert('❌ Já existe uma conta com este email.');
                    return;
                }
                
                conta = {
                    email: email,
                    password: password,
                    dataRegistro: new Date().toISOString()
                };
                contasRegistradas.push(conta);
                localStorage.setItem('contasRegistradas', JSON.stringify(contasRegistradas));
            }

            usuarioLogado = {
                email: email,
                dataLogin: new Date().toISOString()
            };
            
            localStorage.setItem('usuarioLogado', JSON.stringify(usuarioLogado));
            mostrarCalculadora();
