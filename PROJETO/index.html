<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
* {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-image: url('https://www.cobrareporter.com.br/wp-content/uploads/2016/09/Colegio-Souza-Naves-Rolandia.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }
        
        .container {
            background: rgb(255, 255, 255);
            border-radius: 15px;
            box-shadow: 0 200px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1></h1>
            <p></p>
        </div>
        
        <div class="user-info" id="user-info" style="display: none;">
            <div class="user-email" id="user-email-display">
                <span>👤</span> <span id="user-email-text">Usuário</span>
            </div>
            <div class="user-actions">
                <button class="user-btn logout" onclick="logout()">Sair</button>
                <button class="user-btn" onclick="trocarUsuario()">Trocar</button>
            </div>
        </div>
        
        <div class="login-section" id="login-section">
            <div class="login-toggle">
                <button class="toggle-btn" id="toggle-login" onclick="toggleLoginMode()">Já tem uma conta? Fazer login</button>
            </div>
            
            <div id="login-form">
                <h3 style="text-align: center; margin-bottom: 20px; color: #333;" id="login-title">LOGIN</h3>
                
                <div class="input-group">
                    <label for="email">📧 Email:</label>
                    <input type="email" id="email" placeholder="seu.email@exemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">🔒 Senha:</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <div class="input-group" id="confirm-password-group">
                    <label for="confirm-password">🔒 Confirmar Senha:</label>
                    <input type="password" id="confirm-password" placeholder="Digite novamente sua senha" required>
                    <div class="error" id="password-error">⚠️ As senhas não coincidem</div>
                </div>
                
                <button class="btn" id="login-btn" onclick="login()">Criar Conta</button>


                <button class="btn" id="login-btn" onclick="login()">ADMIN</button>
            </div>
        </div>
<body>
    
</body>

</style>

</head>

    </form> 
</body>
</html>
