<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Sistema EduFlux</title>
        <link href="resultado.css" rel="stylesheet">
    </head>

    <body>
        <div id="ocorrencias">
            <label for="cgm">CGM:</label>
            <input type="number" name="cgm" id="cgm_ocorrencias" placeholder="adcione o cgm do aluno" disabled>
            <label for="nome_ocorrencia">Nome do aluno</label>
            <input type="text" name="nome" id="nome_aluno_ocorrencias" placeholder="adcione o nome do aluno" required>
            <div id="resultado"></div>
            <label for="serie">Serie:</label>
            <input type="text" name="serie" placeholder="serie do aluno" disabled>
            <label for="bom_ou_ruim">Tipo de ocorrencia:</label>
            <div class="bom_ou_ruim" >
                <input type="radio" id="bom" name="bom_ruim" value="bom">
                <label for="bom" style="display: inline;">Bom</label>
                <input type="radio" id="ruim" name="bom_ruim" value="ruim">
                <label for="ruim" style="display: inline;">Ruim</label>
            </div>
            <label for="motivo">Motivo:</label>
            <textarea name="motivo" id="motivo_ocorrencia" placeholder="escreva o motivo da ocorrencia"></textarea>
            <button onclick="checar_ocorrencias()">Confirma</button>
        </div>

        <div id="fluxos_saida">
            <label for="cgm">CGM:</label>
            <input type="number" name="cgm" id="cgm_fluxos" placeholder="escreva o cgm do aluno" disabled>
            <label for="nome_">Nome do aluno:</label>
            <input type="text" name="nome" id="nome_aluno_fluxo" placeholder="escreva o nome do aluno">
            <div id="resultado_fluxos"></div>
            <label for="serie">Serie:</label>
            <input type="text" name="serie" id="serie_aluno_fluxo" placeholder="escreva a serie do aluno" disabled>
            <label for="motivo">Motivo:</label>
            <select name="motivo" id="motivo_fluxo">
                <option value="atrasado" name="opcoes">O aluno chegou atrasado</option >
                <option value="saiu mais cedo" name="opcoes">O aluno vai saiu mais cedo</option>
            </select>
            <button onclick="checar_fluxos()">Confirma</button>
        </div>

        <div id="add_alunos">
            <label for="cgm">CGM:</label>
            <input type="number" name="cgm" id="aluno_cgm" placeholder="escreva o cgm do aluno" required>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="aluno_add_nome" placeholder="escreva o nome do aluno" required>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email_aluno_add" placeholder="escreva o email do aluno" required>
            <label for="serie">Serie:</label>
            <select id="series">
                <option value="6°">6°</option>
                <option value="7°">7°</option>
                <option value="8°">8°</option>
                <option value="9°">9°</option>
                <option value="1°">1°</option>
                <option value="2°">2°</option>
                <option value="3°">3°</option>
                <option value="outro_serie">outro</option>
            </select>
            <input type="text" id="outra_serie" placeholder="escreva a serie do aluno" style="display: none;">

            <select id="salas">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="TDS">TDS</option>
                <option value="MKT">MKT</option>
                <option value="outro">outro</option> <!--!DEPOIS VOU ADCIONAR UM INPUT CASO CLIQUE EM OUTRO-->     
            </select>
            <input type="text" id="sala_outro" placeholder="escreva a sala do aluno" style="display: none;">

            <button onclick="checar_add_alunos()">Confirma</button>
        </div>


        <div id="add_usuarios">
            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" id="cpf_usuario" placeholder="escreva o cpf" required>
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome_usuario" placeholder="escreva o nome" required>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email_usuario" placeholder="escreva o email" required>
            <label for="senha">Senha:</label>
            <input type="text" name="senha" id="senha_usuario" placeholder="escreva a senha" required>
            <label for="permissao">Permissao:</label>
            <select id="permissoes" name="permissao">
                <option value="2">Professor</option>
                <option value="1">Portaria</option>
                <option value="0">Admin</option>
            </select>
            <button onclick="checar_add_usuarios()">Confirma</button>
        </div>

        <script src="pagina.js"></script>
    </body>
</html>
