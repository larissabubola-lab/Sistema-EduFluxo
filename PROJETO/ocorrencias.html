<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Ocorrencias</title>
        <link href="ocorrencias.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    </head>

    <body>
        <div id="buscar">
            <div id="input_buscar">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Buscar ocorrencias">
            </div>
            <select>
                <option value=""><i class="bi bi-funnel"></i> Filtro</option>
                <option value="todos"><i class="bi bi-asterisk"></i> Todas</option>
                <option value="positiva"><i class="bi bi-hand-thumbs-up"></i> Positivas</option>
                <option value="negativa"><i class="bi bi-hand-thumbs-down"></i> Negativas</option>
            </select>

        </div>
        <div id="lugar_ocorrencias">
            <button id="adcionar_ocorrencias" onclick="mostrar_formulario()" title="Adicionar uma nova ocorrencia">Adcionar ocorrencia</button>
        </div>


        <div id="ocorrencias" style="display: none;">
            <label for="cgm"> CGM:</label>
            <div name="cgm">
                <i class="bi bi-person-vcard"></i>
                <input type="number"  id="cgm_ocorrencias" placeholder="adcione o cgm do aluno" disabled>
            </div>

            <label for="nome_ocorrencia">Nome do aluno</label>
            <div name="nome" id="input_de_nome">
                <i class="bi bi-person"></i>
                <input type="text" name="nome" id="nome_aluno_ocorrencias" placeholder="adcione o nome do aluno">
                <div id="resultado" style="display: none;"></div>
            </div>

            <!-- <label for="email">Email:</label>
            <div name="email">
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="email do aluno" id="email_aluno" disabled>
            </div> -->

            <label for="serie">Serie:</label>
            <div name="serie">
                <i class="bi bi-backpack"></i>
                <input type="text" placeholder="serie do aluno" id="serie_aluno" disabled>
            </div>

            <label for="usuario">Usuario:</label>
            <div name="usuario">
                <i class="bi bi-person"></i>
                <input type="text" placeholder="usuario" id="usuario_ocorrencia" disabled>
            </div>

            <label for="bom_ou_ruim">Tipo de ocorrencia:</label>
            <div id="bom_ou_ruim">
                <label for="bom" id="label_bom" style="display: inline;">
                    <input type="radio" id="bom" name="bom_ruim" value="positiva" class="radios">
                    <div id="sorriso">😄</div>
                </label>
                
                <label for="ruim" id="label_ruim" style="display: inline;">
                    <input type="radio" id="ruim" name="bom_ruim" value="negativa" class="radios">
                    <div id="triste">😞</div>
                </label>
            </div>

            <label for="motivo">Motivo:</label>
            <textarea name="motivo" id="motivo_ocorrencia" placeholder="escreva o motivo da ocorrencia"></textarea>
            <button onclick="criar_ocorrencia()">Confirma</button>
            <button onclick="cancelar_ocorrencia()">Cancelar</button>
        </div>

        <script src="ocorrencias.js"></script>
    </body>
