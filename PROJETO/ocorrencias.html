<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Ocorrências</title>
        <link href="ocorrencias.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    </head>

    <body>
        <main id="pagina_ocorrencias">
            <div id="buscar">
                <div id="input_buscar">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Buscar ocorrencias" oninput="mostrar_pesquisa()" id="pesquisa">
                </div>
                <select onchange="mostrar_tipos()" id="select">
                    <option value="*"><i class="bi bi-asterisk"></i> Todas</option>
                    <option value="positivas"><i class="bi bi-hand-thumbs-up"></i> Positivas</option>
                    <option value="negativas"><i class="bi bi-hand-thumbs-down"></i> Negativas</option>
                </select>
            </div>

            <div id="lugar_ocorrencias">
                <button id='adcionar_ocorrencias' onclick='mostrar_formulario()' title='Criar uma nova ocorrencia'>Criar nova ocorrencia</button>
            </div>
        </main>


        <div id="ocorrencias" style="display: none;">
            <!-- <h2>Nova ocorrencia</h2> -->
            <div id="div_cgm">
                <label for="cgm"> CGM:</label>
                <div name="cgm" id="input_de_cgm">
                    <div class="a">
                        <i class="bi bi-person-vcard"></i>
                        <input type="number"  id="cgm_ocorrencias" placeholder="adcione o cgm do aluno" autocomplete="off" disabled>
                    </div>
                </div>
            </div>

            <div id="div_nome">
                <label for="nome_ocorrencia">Nome do aluno</label>
                <div name="nome" id="input_de_nome">
                    <div class="a">
                        <i class="bi bi-pencil"></i>
                        <input type="text" name="nome" id="nome_aluno_ocorrencias" placeholder="adcione o nome do aluno" autocomplete="off">
                    </div>
                    <div id="resultado" style="display: none;"></div>
                </div>
            </div>

            <div id="div_serie">
                <label for="serie">Serie:</label>
                <div name="serie" id="input_de_serie">
                    <div class="a">
                        <i class="bi bi-backpack"></i>
                        <input type="text" placeholder="serie do aluno" id="serie_aluno" autocomplete="off" disabled>
                    </div>
                </div>
            </div>

            <div id="div_usuario">
                <label for="usuario">Usuario:</label>
                <div name="usuario" id="input_de_usuario">
                    <div class="a">
                        <i class="bi bi-person"></i>
                        <input type="text" placeholder="usuario" id="usuario_ocorrencia" autocomplete="off" disabled>
                    </div>
                </div>
            </div>

            <div id="div_tipo">
                <label for="bom_ou_ruim">Tipo de ocorrencia:</label>
                <div id="bom_ou_ruim">
                    <label for="bom" id="label_bom" style="display: inline;">
                        <input type="radio" id="bom" name="bom_ruim" value="positiva" class="radios" title="Ocorrência positiva">
                        <div id="sorriso" title="Ocorrência positiva">😄</div>
                    </label>
                
                    <label for="ruim" id="label_ruim" style="display: inline;">
                        <input type="radio" id="ruim" name="bom_ruim" value="negativa" class="radios" title="Ocorrência negativa">
                        <div id="triste" title="Ocorrência negativa">😞</div>
                    </label>
                </div>
            </div>

            <div id="div_motivo">
                <label for="motivo">Motivo:</label>
                <div id="input_de_motivo">
                    <textarea name="motivo" id="motivo_ocorrencia" placeholder="Escreva o motivo da ocorrencia" autocomplete="off"></textarea>
                </div>
            </div>
            <div id="os_botoes">
                <button onclick="criar_ocorrencia()" title="Criar ocorrência"><i class="bi bi-check2"></i>Confirmar</button>
                <button onclick="cancelar_ocorrencia()" title="Cancelar ocorrência"><i class="bi bi-x-lg"></i>Cancelar</button>
                <button onclick="manual()" id="botao_manual" title="Escrever ocorrência manualmente"><i class="bi bi-arrow-clockwise"></i>Criar ocorrencia manual</button>
            </div>
        </div>

        <script src="ocorrencias.js"></script>
    </body>
