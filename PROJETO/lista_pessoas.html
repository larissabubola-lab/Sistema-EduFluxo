<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Sistema EduFluxo</title>
        <link href="lista_pessoas.css" rel="stylesheet">
    </head>
    <body>
        <!-- <h1>Aqui vai ter a opcao de ver os alunos e usuarios.</h1> -->
        <div id="botoes">
            <button id="mostra_os_alunos" onclick="mostra_alunos()">Mostrar alunos</button>
            <button id="mostra_os_usuarios" onclick="mostra_usuarios()">Mostrar usuarios</button>
        </div>

        <div id="area_pesquisa">
            <input type="text" id="pesquisa" placeholder="Digite o nome do aluno ou usuario">
            <button id="botao_pesquisa" onclick="pesquisar()">Pesquisar</button>
        </div>

        

        <div id="lugar_alunos">
            <button id='botao_add_alunos' onclick='mostra_add_alunos()'>Adicionar Alunos</button>
        </div>

        <div id="lugar_usuarios" style="display: none;">
            <button id='botao_add_usuarios' onclick='mostra_add_usuarios()'>Adcionar Usuarios</button>
            

        </div>

        <div id="add_alunos" class="add" style="display: none;">
            <label for="cgm">CGM:</label>
            <input type="number" name="cgm" id="aluno_cgm" placeholder="escreva o cgm do aluno">
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="aluno_add_nome" placeholder="escreva o nome do aluno">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email_aluno_add" placeholder="escreva o email do aluno">
            <label for="serie">Serie:</label>
            <select id="series">
                <option value="">Selecione a série</option>
                <option value="6°">6°</option>
                <option value="7°">7°</option>
                <option value="8°">8°</option>
                <option value="9°">9°</option>
                <option value="1°">1°</option>
                <option value="2°">2°</option>
                <option value="3°">3°</option>
                <option value="outro_serie">outro</option>
            </select>
            <input type="text" id="outra_serie" placeholder="escreva a serie do aluno" style="display: none;">

            <select id="salas">
                <option value="">Selecione a sala</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
                <option value="TDS">TDS</option>
                <option value="MKT">MKT</option>
                <option value="outro">outro</option>    
            </select>
            <input type="text" id="sala_outro" placeholder="escreva a sala do aluno" style="display: none;">

            <button onclick="checar_add_alunos()">Confirma</button>
            <button onclick="cancelar()">Cancelar</button>
        </div>


        <div id="add_usuarios" class="add" style="display:none;">
            <label for="cpf">CPF:</label>
            <input type="text" name="cpf" id="cpf_usuario" placeholder="escreva o cpf">
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome_usuario" placeholder="escreva o nome">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email_usuario" placeholder="escreva o email">
            <label for="senha">Senha:</label>
            <input type="text" name="senha" id="senha_usuario" placeholder="escreva a senha">
            <label for="permissao">Permissao:</label>
            <select id="permissoes" name="permissao">
                <option value="">Selecione a permissão</option>
                <option value="2">Professor</option>
                <option value="1">Portaria</option>
                <option value="0">Admin</option>
            </select>
            <button onclick="checar_add_usuarios()">Confirma</button>
            <button onclick="cancelar_usuarios()">Cancelar</button>
        </div> 


        <script src="lista_pessoas.js"></script>
    </body>
</html>
