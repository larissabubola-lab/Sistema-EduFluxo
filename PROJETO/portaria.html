<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Fluxos</title>
        <link href="portaria.css" rel="stylesheet">
    </head>
    <body>

        <div id="buscar">
            <input type="text" placeholder="Buscar registro">
            <select>
                <option value="">Todos os registros</option>
                <option value="entrada">Atrasos</option>
                <option value="saida">Saiu mais cedo</option>
                <option value="outros">Outros</option>
            </select>
        </div>

        <div id="lugar_portaria">
            <button id="adcionar_fluxos" onclick="mostrar_criar_portaria()" title="Adicionar um novo registro">Adcionar um novo fluxo</button>

        </div>

        <div id="fluxos_saida" style="display:none;">
            <label for="cgm">CGM:</label>
            <div id="div_cgm" name="cgm">
                <i class="bi bi-person-vcard"></i>
                <input type="number" id="cgm_fluxos" placeholder="escreva o cgm do aluno" disabled>
            </div>
            <label for="nome_">Nome do aluno:</label>
            <div name="nome" id="input_de_nome">
                <i class="bi bi-person"></i>
                <input type="text" id="nome_aluno_fluxo" placeholder="escreva o nome do aluno">
                <div id="resultado_fluxos" style="display: none;"></div>
            </div>
            
            <label for="serie">Serie:</label>
            <div name="serie">
                <i class="bi bi-backpack"></i>
                <input type="text" id="serie_aluno_fluxo" placeholder="escreva a serie do aluno" disabled>
            </div>

            <label for="usuario">Usuário:</label>
            <div name="usuario">
                <!-- <i class=""></i> -->
                <input type="text" id="usuario_fluxos" placeholder="quem fez essa documentação">
            </div>

            <label for="motivo">Motivo:</label>
            <select name="motivo" id="motivo_fluxo">
                <option value = "">Selecione o motivo</option>
                <option value="O aluno chegou atrasado" name="opcoes">O aluno chegou atrasado</option >
                <option value="O aluno saiu mais cedo" name="opcoes">O aluno saiu mais cedo</option>
                <option value="outro" name="opcoes">Outro</option>
            </select>
            <input type="text" id="motivo_outro" placeholder="escreva o motivo" style="display: none;">
            <button onclick="criar_fluxos()">Confirma</button>
            <button onclick="cancelar_fluxos()">Cancelar</button>
        </div>

        <script src="portaria.js"></script>
    </body>    
</html>
